<svg xmlns="http://www.w3.org/2000/svg" width="420" height="940" viewBox="0 0 420 940">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2236"/>
      <stop offset="100%" stop-color="#1e2840"/>
    </linearGradient>
    <linearGradient id="artifactBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="940" fill="url(#bg)" rx="16"/>

  <!-- Header -->
  <rect x="310" y="16" width="56" height="22" rx="11" fill="#1e2840" stroke="#3b82f6" stroke-width="1"/>
  <text x="338" y="31" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="600">v2.1.0</text>

  <text x="210" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="700">Guided Dev</text>
  <text x="210" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Structured Development for Claude Code</text>

  <!-- Phase 1 - Intake -->
  <rect x="24" y="100" width="372" height="56" rx="12" fill="url(#cardBg)" filter="url(#shadow)"/>
  <circle cx="52" cy="128" r="14" fill="#22c55e"/>
  <text x="52" y="133" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">1</text>
  <text x="76" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Intake</text>
  <text x="76" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Gather requirements and acceptance criteria</text>
  <!-- Hard gate indicator -->
  <rect x="356" y="118" width="28" height="20" rx="4" fill="#dc2626" opacity="0.2"/>
  <rect x="364" y="122" width="4" height="12" rx="2" fill="#ef4444"/>
  <rect x="372" y="122" width="4" height="12" rx="2" fill="#ef4444"/>

  <!-- Phase 2 - Explore -->
  <rect x="24" y="168" width="372" height="56" rx="12" fill="url(#cardBg)" filter="url(#shadow)"/>
  <circle cx="52" cy="196" r="14" fill="#3b82f6"/>
  <text x="52" y="201" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">2</text>
  <text x="76" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Explore</text>
  <text x="76" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Parallel code-explorer agents map the codebase</text>
  <!-- Agent badge -->
  <rect x="334" y="182" width="52" height="20" rx="10" fill="#3b82f6" opacity="0.2"/>
  <text x="360" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle">2-3 agents</text>

  <!-- Phase 3 - Design -->
  <rect x="24" y="236" width="372" height="56" rx="12" fill="url(#cardBg)" filter="url(#shadow)"/>
  <circle cx="52" cy="264" r="14" fill="#a855f7"/>
  <text x="52" y="269" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">3</text>
  <text x="76" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Design</text>
  <text x="76" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Code-architect agents propose competing architectures</text>
  <!-- Agent badge -->
  <rect x="334" y="250" width="52" height="20" rx="10" fill="#a855f7" opacity="0.2"/>
  <text x="360" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">2-3 agents</text>

  <!-- Artifact: ADR -->
  <rect x="52" y="300" width="316" height="40" rx="8" fill="url(#artifactBg)" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3" opacity="0.9"/>
  <!-- Document icon -->
  <g transform="translate(66, 308)">
    <rect x="0" y="0" width="16" height="20" rx="2" fill="none" stroke="#c084fc" stroke-width="1.5"/>
    <line x1="4" y1="6" x2="12" y2="6" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
    <line x1="4" y1="10" x2="12" y2="10" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
    <line x1="4" y1="14" x2="10" y2="14" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
    <path d="M10,0 L16,6" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  </g>
  <text x="92" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c084fc" font-weight="600">ADR</text>
  <text x="114" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b"> &#x2014; </text>
  <text x="132" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7c85a3">Architecture Decision Record</text>
  <text x="92" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4b5574">docs/adr/NNNN-&lt;slug&gt;.md</text>

  <!-- Phase 4 - Implement -->
  <rect x="24" y="352" width="372" height="56" rx="12" fill="url(#cardBg)" filter="url(#shadow)"/>
  <circle cx="52" cy="380" r="14" fill="#f97316"/>
  <text x="52" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">4</text>
  <text x="76" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Implement</text>
  <text x="76" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Execute chosen plan, write and run tests</text>

  <!-- Phase 5 - Review -->
  <rect x="24" y="420" width="372" height="56" rx="12" fill="url(#cardBg)" filter="url(#shadow)"/>
  <circle cx="52" cy="448" r="14" fill="#ef4444"/>
  <text x="52" y="453" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">5</text>
  <text x="76" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Review</text>
  <text x="76" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Parallel code-reviewer agents with confidence filtering</text>
  <!-- Agent badge -->
  <rect x="347" y="434" width="40" height="20" rx="10" fill="#ef4444" opacity="0.2"/>
  <text x="367" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#f87171" text-anchor="middle">3 agents</text>

  <!-- Phase 6 - Verify -->
  <rect x="24" y="488" width="372" height="56" rx="12" fill="url(#cardBg)" filter="url(#shadow)"/>
  <circle cx="52" cy="516" r="14" fill="#06b6d4"/>
  <text x="52" y="521" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">6</text>
  <text x="76" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Verify</text>
  <text x="76" y="528" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Check each acceptance criterion with evidence</text>

  <!-- Artifact: Acceptance Record -->
  <rect x="52" y="552" width="316" height="40" rx="8" fill="url(#artifactBg)" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,3" opacity="0.9"/>
  <!-- Checkmark document icon -->
  <g transform="translate(66, 560)">
    <rect x="0" y="0" width="16" height="20" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <path d="M4,11 L7,14 L12,7" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="92" y="568" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22d3ee" font-weight="600">Acceptance Record</text>
  <text x="196" y="568" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b"> &#x2014; </text>
  <text x="214" y="568" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7c85a3">Pass/fail with evidence</text>
  <text x="92" y="584" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4b5574">docs/acceptance/NNNN-&lt;slug&gt;.md</text>

  <!-- Phase 7 - PR -->
  <rect x="24" y="604" width="372" height="56" rx="12" fill="url(#cardBg)" filter="url(#shadow)"/>
  <circle cx="52" cy="632" r="14" fill="#22c55e"/>
  <text x="52" y="637" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">7</text>
  <text x="76" y="626" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" font-weight="600">PR</text>
  <text x="76" y="644" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Create pull request with AC checklist</text>
  <!-- Both artifacts included badge -->
  <rect x="310" y="622" width="76" height="20" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="348" y="636" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">+ both artifacts</text>

  <!-- Divider -->
  <line x1="60" y1="684" x2="360" y2="684" stroke="#1e293b" stroke-width="1"/>

  <!-- Specialist Agents Section -->
  <text x="210" y="710" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle" font-weight="600">Specialist Agents</text>

  <!-- Agent cards -->
  <!-- code-explorer -->
  <rect x="24" y="726" width="118" height="64" rx="8" fill="#1a2236" stroke="#3b82f6" stroke-width="1"/>
  <rect x="24" y="726" width="118" height="22" rx="8" fill="#3b82f6" opacity="0.15"/>
  <rect x="24" y="740" width="118" height="2" rx="0" fill="#1a2236"/>
  <text x="83" y="742" font-family="system-ui, -apple-system, monospace" font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="600">code-explorer</text>
  <text x="83" y="760" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Trace paths &amp;</text>
  <text x="83" y="772" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">map architecture</text>

  <!-- code-architect -->
  <rect x="151" y="726" width="118" height="64" rx="8" fill="#1a2236" stroke="#a855f7" stroke-width="1"/>
  <rect x="151" y="726" width="118" height="22" rx="8" fill="#a855f7" opacity="0.15"/>
  <rect x="151" y="740" width="118" height="2" rx="0" fill="#1a2236"/>
  <text x="210" y="742" font-family="system-ui, -apple-system, monospace" font-size="10" fill="#c084fc" text-anchor="middle" font-weight="600">code-architect</text>
  <text x="210" y="760" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Design blueprints</text>
  <text x="210" y="772" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">&amp; trade-offs</text>

  <!-- code-reviewer -->
  <rect x="278" y="726" width="118" height="64" rx="8" fill="#1a2236" stroke="#ef4444" stroke-width="1"/>
  <rect x="278" y="726" width="118" height="22" rx="8" fill="#ef4444" opacity="0.15"/>
  <rect x="278" y="740" width="118" height="2" rx="0" fill="#1a2236"/>
  <text x="337" y="742" font-family="system-ui, -apple-system, monospace" font-size="10" fill="#f87171" text-anchor="middle" font-weight="600">code-reviewer</text>
  <text x="337" y="760" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Bug detection &amp;</text>
  <text x="337" y="772" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">conventions check</text>

  <!-- Divider -->
  <line x1="60" y1="810" x2="360" y2="810" stroke="#1e293b" stroke-width="1"/>

  <!-- Artifacts Legend -->
  <text x="210" y="836" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle" font-weight="600">Artifacts</text>

  <!-- ADR mini card -->
  <rect x="24" y="852" width="180" height="44" rx="8" fill="#1a2236" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3"/>
  <g transform="translate(36, 862)">
    <rect x="0" y="0" width="12" height="16" rx="2" fill="none" stroke="#c084fc" stroke-width="1.2"/>
    <line x1="3" y1="5" x2="9" y2="5" stroke="#c084fc" stroke-width="0.8" opacity="0.6"/>
    <line x1="3" y1="8" x2="9" y2="8" stroke="#c084fc" stroke-width="0.8" opacity="0.6"/>
    <line x1="3" y1="11" x2="7" y2="11" stroke="#c084fc" stroke-width="0.8" opacity="0.6"/>
  </g>
  <text x="56" y="870" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c084fc" font-weight="600">ADR</text>
  <text x="56" y="884" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">After Design — decisions &amp; rationale</text>

  <!-- Acceptance Record mini card -->
  <rect x="216" y="852" width="180" height="44" rx="8" fill="#1a2236" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,3"/>
  <g transform="translate(228, 862)">
    <rect x="0" y="0" width="12" height="16" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
    <path d="M3,9 L5,11 L9,6" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="248" y="870" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22d3ee" font-weight="600">Acceptance Record</text>
  <text x="248" y="884" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">After Verify — evidence &amp; status</text>

  <!-- Footer features -->
  <g transform="translate(0, 0)">
    <rect x="18" y="906" width="92" height="22" rx="11" fill="#1e293b"/>
    <text x="64" y="920" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Pause on ambiguity</text>

    <rect x="116" y="906" width="80" height="22" rx="11" fill="#1e293b"/>
    <text x="156" y="920" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Phase tracking</text>

    <rect x="202" y="906" width="86" height="22" rx="11" fill="#1e293b"/>
    <text x="245" y="920" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Playwright for UI</text>

    <rect x="294" y="906" width="78" height="22" rx="11" fill="#1e293b"/>
    <text x="333" y="920" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Human gates</text>

    <rect x="378" y="906" width="28" height="22" rx="11" fill="#1e293b"/>
  </g>
</svg>